# iitd_tools configuration example
# Copy this file to config.yaml and update the values for your environment.

# Application settings
app:
  name: iitd_tools
  debug: false
  log_level: INFO

# Database settings
database:
  host: localhost
  port: 5432
  name: iitd_tools_db
  user: your_db_user
  password: your_db_password

# API settings
api:
  host: 0.0.0.0
  port: 8000
  secret_key: change_this_to_a_random_secret

# External services
services:
  timeout: 30
